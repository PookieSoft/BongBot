name: Create Release and Deploy BongBot

# Thin caller for PookieSoft/workflows release.

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: read
    packages: read

jobs:
    release:
        uses: PookieSoft/workflows/.github/workflows/release.yml@v1
        with:
            runtime: node
            build-docker: true
            docker-image-name: bongbot
            publish-package: false
            codecov-slug: PookieSoft/BongBot
            environment: Prod
            ssh-deploy: true
        secrets: inherit
